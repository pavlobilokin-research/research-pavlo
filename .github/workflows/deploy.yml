name: Deploy Research Hub

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual re-deploy from GitHub UI

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Inject RESEARCH_TOKEN into config.js ──────────────────────────────
      # This file is generated fresh on every deploy — never committed to git.
      # The token lives only in repo Secrets (Settings → Secrets → RESEARCH_TOKEN).
      - name: Generate config.js
        env:
          RESEARCH_TOKEN: ${{ secrets.RESEARCH_TOKEN }}
        run: |
          cat > config.js <<EOF
          // Auto-generated by GitHub Actions — do NOT commit this file.
          window.DRESSLY_CONFIG = {
            owner:  "pavlobilokin-research",
            repo:   "research-pavlo",
            branch: "main",
            token:  "$RESEARCH_TOKEN"
          };
          EOF

      # ── Upload the site (all files + generated config.js) ─────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # uploads everything in the repo root + the generated config.js

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
