name: Deploy Research Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate config.js
        env:
          RESEARCH_TOKEN: ${{ secrets.RESEARCH_TOKEN }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          printf 'window.DRESSLY_CONFIG = {\n  owner: "pavlobilokin-research",\n  repo: "research-pavlo",\n  branch: "main",\n  token: "%s",\n  password: "%s"\n};\n' "$RESEARCH_TOKEN" "$PASSWORD" > config.js
          echo "config.js generated:"
          cat config.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
